<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CALCULADORA</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="calculator">
    <div class="display">
      <span id="screen">00000000</span>
    </div>
    <div class="buttons">
      <button class="btn btn-red"    onclick="clearDisplay()">C</button>
      <button class="btn btn-red"   onclick="allClear()">AC</button>
      <button class="btn btn-dark"   onclick="appendToDisplay('%')">%</button>
      <button class="btn btn-dark"   onclick="appendToDisplay('*')">X</button>
      <button class="btn btn-num"    onclick="appendToDisplay('7')">7</button>
      <button class="btn btn-num"    onclick="appendToDisplay('8')">8</button>
      <button class="btn btn-num"    onclick="appendToDisplay('9')">9</button>
      <button class="btn btn-dark"   onclick="appendToDisplay('/')">÷</button>
      <button class="btn btn-num"    onclick="appendToDisplay('4')">4</button>
      <button class="btn btn-num"    onclick="appendToDisplay('5')">5</button>
      <button class="btn btn-num"    onclick="appendToDisplay('6')">6</button>
      <button class="btn btn-dark"   onclick="appendToDisplay('-')">−</button>
      <button class="btn btn-num"    onclick="appendToDisplay('1')">1</button>
      <button class="btn btn-num"    onclick="appendToDisplay('2')">2</button>
      <button class="btn btn-num"    onclick="appendToDisplay('3')">3</button>
      <button class="btn btn-plus"   onclick="appendToDisplay('+')" id="btn-plus">+</button>
      <button class="btn btn-num"    onclick="appendToDisplay('.')">.</button>
      <button class="btn btn-num"    onclick="appendToDisplay('0')">0</button>
      <button class="btn btn-num btn-equals-left" onclick="calculate()">=</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
